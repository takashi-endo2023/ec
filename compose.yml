services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ec_development
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: bash -c "bundle exec rails db:create db:migrate db:seed && bundle exec rails s -b 0.0.0.0"
    environment:
      DATABASE_URL: mysql2://root:password@db:3306/ec_development
      CORS_ORIGINS: "http://localhost:5173"
      SECRET_KEY_BASE: "dev_secret_key_base_at_least_64_chars_long_for_development_only"
      RAILS_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  mysql_data:
  bundle_cache:
